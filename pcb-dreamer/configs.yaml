defaults:
  logdir: null
  traindir: null
  evaldir: null
  offline_traindir: ''
  offline_evaldir: ''
  seed: 0
  deterministic_run: False
  steps: 5e5
  parallel: False
  eval_every: 1e4
  eval_episode_num: 10
  log_every: 5e3
  reset_every: 0
  device: 'cuda:0'
  compile: False
  precision: 32
  debug: False
  video_pred_log: True
  task: 'pcb_tp_placement'
  size: [64, 64]
  envs: 1
  action_repeat: 1
  time_limit: 25
  grayscale: False
  prefill: 5000
  reward_EMA: True
  dyn_hidden: 512
  dyn_deter: 512
  dyn_stoch: 32
  dyn_discrete: 32
  dyn_rec_depth: 1
  dyn_mean_act: 'none'
  dyn_std_act: 'sigmoid2'
  dyn_min_std: 0.1
  grad_heads: ['decoder', 'reward', 'cont']
  units: 512
  act: 'SiLU'
  norm: True
  encoder:
    {mlp_keys: '$^', cnn_keys: 'image', act: 'SiLU', norm: True, cnn_depth: 32, kernel_size: 4, minres: 4, mlp_layers: 5, mlp_units: 1024, symlog_inputs: True}
  decoder:
    {mlp_keys: '$^', cnn_keys: 'image', act: 'SiLU', norm: True, cnn_depth: 32, kernel_size: 4, minres: 4, mlp_layers: 5, mlp_units: 1024, cnn_sigmoid: False, image_dist: mse, vector_dist: symlog_mse, outscale: 1.0}
  actor:
    {layers: 2, dist: 'onehot', std: 'none', entropy: 3e-3, unimix_ratio: 0.01, min_std: 0.1, max_std: 1.0, temp: 0.1, lr: 3e-5, eps: 1e-5, grad_clip: 100.0, outscale: 1.0}
  critic:
    {layers: 2, dist: 'symlog_disc', slow_target: True, slow_target_update: 1, slow_target_fraction: 0.02, lr: 3e-5, eps: 1e-5, grad_clip: 100.0, outscale: 0.0}
  reward_head:
    {layers: 2, dist: 'symlog_disc', loss_scale: 1.0, outscale: 0.0}
  cont_head:
    {layers: 2, loss_scale: 1.0, outscale: 1.0}
  dyn_scale: 0.5
  rep_scale: 0.1
  kl_free: 1.0
  weight_decay: 0.0
  unimix_ratio: 0.01
  initial: 'learned'
  batch_size: 16
  batch_length: 32
  train_ratio: 512
  pretrain: 100
  model_lr: 1e-4
  opt_eps: 1e-8
  grad_clip: 1000
  dataset_size: 1000000
  opt: 'adam'
  discount: 0.997
  discount_lambda: 0.95
  imag_horizon: 25
  imag_gradient: 'reinforce'
  imag_gradient_mix: 0.0
  eval_state_mean: False
  expl_behavior: 'greedy'
  expl_until: 0
  expl_extr_scale: 0.0
  expl_intr_scale: 1.0
  disag_target: 'stoch'
  disag_log: True
  disag_models: 10
  disag_offset: 1
  disag_layers: 4
  disag_units: 400
  disag_action_cond: False

debug:
  debug: True
  pretrain: 10
  prefill: 200
  batch_size: 10
  batch_length: 16
  steps: 1000
  eval_every: 500
  eval_episode_num: 2
  log_every: 100
  video_pred_log: False

# Smoke test: confirms the pipeline runs end-to-end after a code change.
# Same architecture/batch dims as `defaults`, just a tiny step budget.
smoke:
  steps: 1500
  prefill: 200
  eval_every: 500
  eval_episode_num: 2
  log_every: 100
  video_pred_log: False

# Fast iteration: enough steps to see a trend across several eval cycles
# without a long wait. Good for "did this change move the needle" checks.
fast_iter:
  steps: 10000
  prefill: 500
  eval_every: 1000
  eval_episode_num: 5
  log_every: 500
  video_pred_log: False

# Standard run: real comparison runs (e.g. before/after a fix).
standard:
  steps: 100000
  prefill: 2000
  eval_every: 5000
  eval_episode_num: 10
  log_every: 1000
  video_pred_log: False

# Large run: final/longer runs, with video prediction logging enabled
# for qualitative inspection.
large:
  steps: 500000
  prefill: 5000
  eval_every: 10000
  eval_episode_num: 10
  log_every: 2000
  video_pred_log: True